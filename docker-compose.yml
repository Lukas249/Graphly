include:
  - path: ./judge0/docker-compose.yml

services:
  graphly-web:
    image: lukas249/graphly:latest
    build: .
    env_file:
      - .env
    depends_on:
      graphly-redis:
        condition: service_healthy
      graphly-mysql:
        condition: service_healthy
      judge0-server:
        condition: service_started
    ports:
      - "3000:3000"
  graphly-redis:
    image: "redis:8.4.0"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  graphly-mysql:
    image: "mysql:8.0.45"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - graphly_mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  graphly_mysql_data:
