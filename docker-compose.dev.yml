services:
  graphly-web:
    command: sh -c "npx prisma generate && npm run dev"
    environment:
      - WATCHPACK_POLLING=true
    develop:
      watch:
        - action: sync
          path: .
          target: /usr/local/app
          ignore:
            - node_modules/
            - .next/
            - coverage/
            - .git/
            - certificates/
            - prisma/generated/
            - init.sql
        - action: rebuild
          path: package.json
